<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0d6efd" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="InovaWeb" />
    <link rel="apple-touch-icon" href="images/icon-192.png" />
    <link rel="icon" type="image/png" href="images/icon-192.png" />
    <link rel="stylesheet" href="../CSS/loguin.css">
    <title>Login</title>
</head>

<body>
    <div class="background-shapes"></div>

    <div class="login-wrapper">

        <div class="login-brand">
            <img src="images/icon-512.png" alt="Logo Sistema">

            <h1>Machine Manager</h1>

            <p>
                Sistema Inteligente para Gestão Industrial
            </p>
        </div>

        <div class="login-container">

            <h2>Acesso ao Sistema</h2>

            <label>Email</label>
            <input type="email" id="email" placeholder="Digite seu email">

            <label>Senha</label>
            <div class="password-container">
                <input type="password" id="password" placeholder="Digite sua senha">
            </div>

            <button onclick="efetuarLoguin()">
                Entrar
            </button>

        </div>

    </div>

    <script src="../JavaScript/login.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log("Pronto! Seu site agora é um App."))
                .catch((err) => console.log("Erro ao criar o App:", err));
        }
    </script>
</body>

</html>
